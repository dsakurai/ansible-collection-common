---
# Default variables for neovim_config role
# Directory where neovim config files are written (e.g. init.lua).
nvim_config_dir: "{{ lookup('env', 'HOME') }}/.config/nvim"
# Path to the Obsidian workspace used by obsidian.nvim plugin.
# Users can override this in playbooks/inventory/host_vars.
obsidian_workspace_private_path: "~/private/notes/obsidian/config/Obsidian Vault"
