---
- name: Set up editor
  block:
    - name: With sudo
      become: true
      block:
        - name: install neovim
          apt:
            name: neovim

        - name: Set editor for Debian
          shell: update-alternatives --install /usr/bin/editor editor /usr/bin/nvim 100

        - name: Set editor env var
          copy:
            content: |
              export EDITOR="/usr/bin/nvim"
            dest: /etc/profile.d/editor.sh

    - name: Without sudo
      block:
        - name: Ensure local cache dir exists
          file:
            path: "{{ lookup('env', 'HOME') }}/local/cache"
            state: directory
            mode: "0755"
        - name: Ensure user bin dir exists
          file:
            path: "{{ lookup('env', 'HOME') }}/bin"
            state: directory
            mode: "0755"

        - name: Ensure Neovim AppImage arch is supported
          fail:
            msg: "Neovim AppImage auto-install currently supports only x86_64/amd64; got {{ ansible_architecture }}"
          when: ansible_architecture not in ["x86_64", "amd64"]

        - name: Get latest Neovim release metadata
          uri:
            url: https://api.github.com/repos/neovim/neovim/releases/latest
            return_content: true
          register: neovim_release
          changed_when: false

        - name: Pick Linux x86_64 AppImage asset
          set_fact:
            neovim_appimage_url: "{{ neovim_release.json.assets | selectattr('name', 'search', 'nvim-linux-x86_64.appimage$') | map(attribute='browser_download_url') | first | default('') }}"
            neovim_appimage_tag: "{{ neovim_release.json.tag_name }}"

        - name: Fail if AppImage asset is unavailable
          fail:
            msg: "Could not find Linux x86_64 AppImage asset in latest Neovim release {{ neovim_release.json.tag_name }}"
          when: neovim_appimage_url == ""

        - name: Download latest Neovim AppImage
          get_url:
            url: "{{ neovim_appimage_url }}"
            dest: "{{ lookup('env', 'HOME') }}/local/cache/nvim.appimage"
            mode: "0755"

        - name: Set nvim symlink to latest AppImage
          file:
            src: "{{ lookup('env', 'HOME') }}/local/cache/nvim.appimage"
            dest: "{{ lookup('env', 'HOME') }}/bin/nvim"
            state: link

        - name: Set editor env var
          blockinfile:
            path: "{{ lookup('env', 'HOME') }}/.bashrc"
            create: true
            marker: "# {mark} Managed by Ansible (editor)"
            block: |
              # Ensure user's local bin is on PATH so nvim is discoverable
              export PATH="$HOME/bin:$PATH"
              export EDITOR="$HOME/bin/nvim"

    - name: Deploy init.lua for Neovim
      tags: neovim
      blockinfile:
        dest: "{{ lookup('env','HOME') }}/.config/nvim/init.lua"
        create: true
        marker: -- {mark} Managed by Ansible --
        content: |
          -- Locale settings
          vim.cmd('language en_US.UTF-8')

          -- Press Shift+Tab to deindent
          vim.keymap.set("i", "<S-Tab>", "<C-d>")
          vim.keymap.set("n", "<S-Tab>", "<<")
          vim.keymap.set("v", "<S-Tab>", "<gv")

          vim.opt.expandtab = true -- Insert spaces instead of tabs
          vim.opt.shiftwidth = 2 -- Indentation size

          -- Backspace deletes one space only, not the whole indent
          vim.opt.smarttab = false
          vim.opt.softtabstop = 1

          -- Python overrides the style...
          vim.api.nvim_create_autocmd("FileType", {
            pattern = "python",
            callback = function()
              vim.bo.softtabstop = 1
            end,
          })


- name: Cycle bash completion with TAB
  blockinfile:
    block: |
      set show-all-if-ambiguous on
      set menu-complete-display-prefix on

      set editing-mode vi

      set keymap vi-command
      "\C-l": clear-screen

      set keymap vi-insert
      "\C-l": clear-screen
      TAB: menu-complete
      "\e[Z": menu-complete-backward
      "\C-f": forward-char
      "\C-b": backward-char

    dest: ~/.inputrc
    create: true


- name: Install basic stuff
  apt:
    name:
      - bash-completion
      - tree
  become: true

- name: Install ranger
  block:
    - name: Install ranger with apt
      apt:
        name: ranger
      become: true

    - name: ensure rifle.conf exists
      tags: rifle
      command:
        cmd: ranger --copy-config=rifle
        creates: "~/.config/ranger/rifle.conf"
      environment:
        TERM: dumb # tell curses to use the minimal terminal definition, which is always available and doesn't require a full terminfo entry. This lets ranger --copy-config=rifle complete successfully without a real TTY.Adding environment: TERM: dumb tells curses to use the minimal "dumb" terminal definition, which is always available and doesn't require a full terminfo entry. This lets ranger --copy-config=rifle complete successfully without a real TTY.

    - name: open yml / yaml in nvim
      tags: ranger
      blockinfile:
        path: "~/.config/ranger/rifle.conf"
        insertbefore: BOF
        block: |

          # Prefer $EDITOR/$VISUAL for YAML and patch files.
          # Matches .yml, .yaml and .patch; placed before generic/xdg-open rules.
          ext ya?ml|patch, label editor = ${VISUAL:-$EDITOR} -- "$@"
          ext ya?ml|patch, label pager  = ${PAGER:-less} -- "$@"


