---
- name: VSCode settings
  tags: json
  vars:
    nvim_exe: "C:\\Users\\Daisuke Sakurai\\scoop\\shims\\nvim.exe"
  block:

    - name: Check variable
      when: vscode_settings_json is not defined
      fail:
        msg: "Set vscode_settings_json variable to invoke this role."

    - name: If the settings file is empty, add '{}'
      block:
        - name: Acquire the file status
          stat:
            path: "{{ vscode_settings_json }}"
          register: json_status

        - name: Initialize settings.json with '{}' if the file is missing or empty
          ansible.builtin.copy:
            dest: "{{ vscode_settings_json }}"
            content: "{}"
          when: not json_status.stat.exists or json_status.stat.size|int == 0


    - name: Read VSCode settings
      set_fact:
        jsondata: "{{ lookup('file', vscode_settings_json) | from_json}}"

    - name: VSCode settings to be added
      set_fact:
        vscode: {
            "dev.containers.executeInWSL": true,
            "editor.minimap.enabled": false,
            "editor.wordWrap": "on",
            "extensions.experimental.affinity": {
                "asvetliakov.vscode-neovim": 1
            },
            "github.copilot.enable": {
                "*": false,
                "markdown": false,
                "plaintext": false,
                "scminput": false,
                "yaml": false
            },
            "github.copilot.nextEditSuggestions.enabled": false,
            "python.analysis.typeCheckingMode": "standard",
            "redhat.telemetry.enabled": false,
            "remote.autoForwardPortsSource": "hybrid",
            "security.allowedUNCHosts": [
                "wsl.localhost"
            ],
            "terminal.integrated.enableMultiLinePasteWarning": "never",
            "vscode-neovim.ctrlKeysForInsertMode": [
                "a",
                "d",
                "j",
                "m",
                "o",
                "r",
                "t",
                "u",
                "w",
                "h",
                "x",
                "f",
                "n",
                "p"
            ],
            "vscode-neovim.ctrlKeysForNormalMode": [
                "a",
                "b",
                "d",
                "e",
                "f",
                "h",
                "i",
                "j",
                "k",
                "l",
                "m",
                "o",
                "r",
                "t",
                "u",
                "w",
                "x",
                "y",
                "z",
                "/",
                "]",
                "right",
                "left",
                "up",
                "down",
                "backspace",
                "delete",
                "v"
            ],
            "vscode-neovim.neovimExecutablePaths.darwin": "",
            "vscode-neovim.neovimExecutablePaths.linux": "/usr/bin/nvim",
            "vscode-neovim.neovimExecutablePaths.win32": "{{ nvim_exe }}",
            "workbench.colorCustomizations": {
                "titleBar.activeBackground":   "#8dc3ec77",
                "titleBar.activeForeground":   "#000000",
                "titleBar.inactiveBackground": "#8dc3ec10",
                "titleBar.inactiveForeground": "#00000020",
            },
            "workbench.colorTheme": "Default Light+",
            "workbench.startupEditor": "none"
        }
    - name: Insert our VSCode settings
      set_fact:
        merged: "{{ vscode | combine (jsondata) }}"

    - name: Write our settings to settings.json
      ansible.builtin.copy:
        content: "{{ merged | to_nice_json }}"
        dest: "{{ vscode_settings_json }}"
        backup: true
