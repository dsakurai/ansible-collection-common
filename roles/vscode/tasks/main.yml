---
- name: Check variable
  when: vscode_settings_dir is not defined
  fail:
    msg: "Set vscode_settings_dir variable to invoke this role."

- name: VSCode settings
  tags: json
  vars:
    settings_json:
      path: "{{ [vscode_settings_dir, 'settings.json'] | path_join }}"
      empty: "{}"
      content: { # VSCode settings to be added
        "dev.containers.executeInWSL": true,
        "editor.minimap.enabled": false,
        "editor.wordWrap": "on",
        "extensions.experimental.affinity": {
            "asvetliakov.vscode-neovim": 1
        },
        "github.copilot.enable": {
            "*": false,
            "markdown": false,
            "plaintext": false,
            "scminput": false,
            "yaml": false
        },
        "github.copilot.nextEditSuggestions.enabled": false,
        "python.analysis.typeCheckingMode": "standard",
        "redhat.telemetry.enabled": false,
        "remote.autoForwardPortsSource": "hybrid",
        "security.allowedUNCHosts": [
            "wsl.localhost"
        ],
        "terminal.integrated.enableMultiLinePasteWarning": "never",
        "vscode-neovim.ctrlKeysForInsertMode": [
            "a",
            "d",
            "j",
            "m",
            "o",
            "r",
            "t",
            "u",
            "w",
            "h",
            "x",
            "f",
            "n",
            "p"
        ],
        "vscode-neovim.ctrlKeysForNormalMode": [
            "a",
            "b",
            "d",
            "e",
            "f",
            "h",
            "i",
            "j",
            "k",
            "l",
            "m",
            "o",
            "r",
            "t",
            "u",
            "w",
            "x",
            "y",
            "z",
            "/",
            "]",
            "right",
            "left",
            "up",
            "down",
            "backspace",
            "delete",
            "v"
        ],
        "vscode-neovim.neovimExecutablePaths.darwin": "",
        "vscode-neovim.neovimExecutablePaths.linux": "/usr/bin/nvim",
        "vscode-neovim.neovimExecutablePaths.win32": "{{ nvim_exe }}",
        "workbench.colorCustomizations": {
            "titleBar.activeBackground":   "#8dc3ec77",
            "titleBar.activeForeground":   "#000000",
            "titleBar.inactiveBackground": "#8dc3ec10",
            "titleBar.inactiveForeground": "#00000020",
        },
        "workbench.colorTheme": "Default Light+",
        "workbench.startupEditor": "none"
    }

  block:

    - name: If the settings file is empty, add '{}'
      block:
        - name: Acquire the file status
          stat:
            path: "{{ settings_json.path }}"
          register: json_status

        - name: Initialize settings.json with '{}' if the file is missing or empty
          ansible.builtin.copy:
            dest: "{{ settings_json.path }}"
            content: "{{ settings_json.empty }}"
          when: not json_status.stat.exists or json_status.stat.size|int == 0


    - name: Read VSCode settings
      set_fact:
        jsondata: "{{ lookup('file', settings_json.path) | from_json}}"

    - name: Insert our VSCode settings
      set_fact:
        merged: "{{ settings_json.content | combine (jsondata) }}"

    - name: Show BEFORE / AFTER of settings
      block:
      - name: Create temp file for current settings
        ansible.builtin.tempfile:
          state: file
          suffix: .old.json
        register: current_settings_tmp

      - name: Create temp file for merged settings
        ansible.builtin.tempfile:
          state: file
          suffix: .new.json
        register: merged_settings_tmp

      - name: Write normalized current settings to temp file
        ansible.builtin.copy:
          dest: "{{ current_settings_tmp.path }}"
          content: "{{ jsondata | to_nice_json }}"

      - name: Write normalized merged settings to temp file
        ansible.builtin.copy:
          dest: "{{ merged_settings_tmp.path }}"
          content: "{{ merged | to_nice_json }}"

      - name: Compare current and merged settings
        ansible.builtin.command:
          cmd: "diff -U0 {{ current_settings_tmp.path }} {{ merged_settings_tmp.path }}"
        register: vscode_settings_diff
        changed_when: false
        failed_when: vscode_settings_diff.rc not in [0, 1]

      - name: Show settings diff
        when: vscode_settings_diff.rc == 1
        ansible.builtin.debug:
          msg: |
            {{ vscode_settings_diff.stdout.splitlines() }}

    - name: Write our settings to settings.json
      ansible.builtin.copy:
        content: "{{ merged | to_nice_json }}"
        dest: "{{ settings_json.path }}"
        backup: true
