---
- name: Check variable
  when: vscode_settings_dir is not defined
  fail:
    msg: "Set vscode_settings_dir variable to invoke this role."

- name: VSCode settings
  tags: json
  vars:
    keybindings_json:
      path: "{{ [vscode_settings_dir, 'keybindings.json'] | path_join }}"
      content: [
          {
              "key": "ctrl+shift+c",
              "command": "-workbench.action.terminal.openNativeConsole",
              "when": "!terminalFocus"
          },
          {
              "key": "ctrl+shift+c",
              "command": "editor.action.clipboardCopyAction"
          },
          {
              "key": "ctrl+c",
              "command": "-editor.action.clipboardCopyAction"
          },
          {
              "key": "ctrl+shift+v",
              "command": "editor.action.clipboardPasteAction"
          },
          {
              "key": "ctrl+v",
              "command": "-editor.action.clipboardPasteAction"
          },
          {
              "key": "ctrl+shift+i",
              "command": "inlineChat.start",
              "when": "editorFocus && inlineChatHasEditsAgent && inlineChatPossible && !editorReadonly && !editorSimpleInput && activeEditor != 'workbench.editor.notebook' || editorFocus && inlineChatHasNotebookAgent && inlineChatPossible && !editorReadonly && !editorSimpleInput && activeEditor == 'workbench.editor.notebook' || editorFocus && inlineChatHasNotebookInline && inlineChatPossible && !editorReadonly && !editorSimpleInput && activeEditor == 'workbench.editor.notebook' || editorFocus && inlineChatHasProvider && inlineChatPossible && !editorReadonly && !editorSimpleInput && activeEditor != 'workbench.editor.notebook'"
          },
          {
              "key": "ctrl+i",
              "command": "-inlineChat.start",
              "when": "editorFocus && inlineChatHasEditsAgent && inlineChatPossible && !editorReadonly && !editorSimpleInput && activeEditor != 'workbench.editor.notebook' || editorFocus && inlineChatHasNotebookAgent && inlineChatPossible && !editorReadonly && !editorSimpleInput && activeEditor == 'workbench.editor.notebook' || editorFocus && inlineChatHasNotebookInline && inlineChatPossible && !editorReadonly && !editorSimpleInput && activeEditor == 'workbench.editor.notebook' || editorFocus && inlineChatHasProvider && inlineChatPossible && !editorReadonly && !editorSimpleInput && activeEditor != 'workbench.editor.notebook'"
          }
      ]

    settings_json:
      path: "{{ [vscode_settings_dir, 'settings.json'] | path_join }}"
      content: { # VSCode settings to be added
        "dev.containers.executeInWSL": true,
        "dev.containers.defaultFeatures": {
                "ghcr.io/devcontainers/features/git:1": { // Only needed when the Devcontainer does not provide a decent git binary.
                    # "version": "os-provided" # The default. When the VSCode is running on Windows and DevContainer on WSL, seems the Windows' git is passed.The understanding is important for managing credentials.
            }
        },
        "dotfiles.targetPath": "/tmp/dotfiles",
        "dotfiles.repository": "git@github.com:dsakurai/ansible-dotfiles.git",
        "editor.minimap.enabled": false,
        "editor.wordWrap": "on",
        "extensions.experimental.affinity": {
            "asvetliakov.vscode-neovim": 1
        },
        "github.copilot.enable": {
            "*": false,
            "markdown": false,
            "plaintext": false,
            "scminput": false,
            "yaml": false
        },
        "github.copilot.nextEditSuggestions.enabled": false,
        "python.analysis.typeCheckingMode": "standard",
        "redhat.telemetry.enabled": false,
        "remote.autoForwardPortsSource": "hybrid",
        "security.allowedUNCHosts": [
            "wsl.localhost"
        ],
        "terminal.integrated.enableMultiLinePasteWarning": "never",
        "vscode-neovim.ctrlKeysForInsertMode": [
            "a",
            "d",
            "j",
            "m",
            "o",
            "r",
            "t",
            "u",
            "w",
            "h",
            "x",
            "f",
            "n",
            "p"
        ],
        "vscode-neovim.ctrlKeysForNormalMode": [
            "a",
            "b",
            "d",
            "e",
            "f",
            "h",
            "i",
            "j",
            "k",
            "l",
            "m",
            "o",
            "r",
            "t",
            "u",
            "w",
            "x",
            "y",
            "z",
            "/",
            "]",
            "right",
            "left",
            "up",
            "down",
            "backspace",
            "delete",
            "v"
        ],
        "workbench.settings.applyToAllProfiles": [
            "dotfiles.repository"
        ],
        "editor.autoIndentOnPaste": true,
        "editor.autoIndentOnPasteWithinString": false,
        "editor.cursorSmoothCaretAnimation": "on",
        "terminal.integrated.commandsToSkipShell": [
          "-workbench.action.quickOpen"
        ],
        "terminal.integrated.rightClickBehavior": "default",        # Context menu
        "terminal.integrated.stickyScroll.enabled": false,
        "terminal.integrated.sendKeybindingsToShell": true,
        "terminal.integrated.scrollback": 1000000,                  # Number of lines in the terminal scrollback
        "terminal.integrated.persistentSessionScrollback": 1000000, # Retain this many scrollback after restart
        "terminal.integrated.suggest.enabled": false,               # Annoying most of the time
        "terminal.integrated.suggest.inlineSuggestion": "off",
        "[latex]": {
            "editor.wordBasedSuggestions": "off",
            "editor.snippetSuggestions": "none",
            "editor.foldingStrategy": "indentation",
        },
        "vscode-neovim.neovimExecutablePaths.win32": "{{ nvim_exe }}",
        "workbench.colorCustomizations": {
            "titleBar.activeBackground":   "#8dc3ec77",
            "titleBar.activeForeground":   "#000000",
            "titleBar.inactiveBackground": "#8dc3ec10",
            "titleBar.inactiveForeground": "#00000020",
        },
        "workbench.colorTheme": "Default Light+",
        "workbench.settings.applyToAllProfiles": [
            "dotfiles.repository"
        ],
        "terminal.integrated.defaultProfile.linux": "bash",
        "terminal.integrated.profiles.linux": {
            "bash": {
                "path": "/usr/bin/bash"
            },
            "fish": {
                "path": "fish",
            },
            "pwsh": {
                "icon": "terminal-powershell",
                "path": "pwsh",
            },
            "tmux": {
                "icon": "terminal-tmux",
                "path": "tmux",
            },
            "zsh": {
                "path": "zsh"
            }
        },
        "workbench.startupEditor": "none"
      }

  block:

    - name: Update settings.json
      ansible.builtin.include_role:
        name: dsakurai.common.update_json
      vars:
        json_file: "{{ settings_json }}"

    - name: Update keybindings.json
      ansible.builtin.include_role:
        name: dsakurai.common.update_json
      vars:
        json_file: "{{ keybindings_json }}"
