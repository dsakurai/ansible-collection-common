---
- name: zellij
  block:

    - name: Install latest Zellij
      community.general.cargo:
        name: zellij
        state: latest
        executable: "{{ cargo_binary }}"
      environment:
        OPENSSL_NO_VENDOR: "1" # force link to system libssl

    - name: Apply theme
      ansible.builtin.lineinfile:
        path: "~/.config/zellij/config.kdl"
        line: theme "catppuccin-latte"
        create: true
